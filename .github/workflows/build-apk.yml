name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 4: Install Capacitor globally
      - name: Install Capacitor
        run: npm install -g @capacitor/cli @capacitor/android

      # Step 5: Initialize Capacitor with www folder
      - name: Initialize Capacitor
        run: npx cap init "Electrician Pro" "com.electrician.pro" --web-dir www

      # Step 6: Add Android platform
      - name: Add Android Platform
        run: npx cap add android

      # Step 7: Sync files to Android (copy www to android)
      - name: Sync to Android
        run: npx cap sync android

      # Step 8: Build APK
      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # Step 9: Upload APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Electrician-Pro-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn
